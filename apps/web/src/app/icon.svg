<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- ears -->
  <polygon points="6,12 3,4 10,9" fill="#89CFF0"/>
  <polygon points="26,12 29,4 22,9" fill="#89CFF0"/>
  <!-- head -->
  <circle cx="16" cy="16" r="12" fill="#89CFF0"/>
  <!-- belly -->
  <ellipse cx="16" cy="22" rx="6" ry="5" fill="#FFF8E1"/>
  <!-- glasses rims -->
  <circle cx="11" cy="13" r="5.5" fill="none" stroke="#555" stroke-width="1.5"/>
  <circle cx="21" cy="13" r="5.5" fill="none" stroke="#555" stroke-width="1.5"/>
  <line x1="16.5" y1="12" x2="15.5" y2="12" stroke="#555" stroke-width="1.5"/>
  <!-- eye whites -->
  <circle cx="11" cy="13" r="4.5" fill="#fff"/>
  <circle cx="21" cy="13" r="4.5" fill="#fff"/>
  <!-- pupils -->
  <circle cx="11" cy="13" r="2" fill="#333"/>
  <circle cx="21" cy="13" r="2" fill="#333"/>
  <!-- beak -->
  <polygon points="16,16 14.5,19 17.5,19" fill="#FF9800"/>
  <!-- bow tie -->
  <polygon points="14,20 16,21.5 14,23" fill="#E53935"/>
  <polygon points="18,20 16,21.5 18,23" fill="#E53935"/>
  <circle cx="16" cy="21.5" r="0.8" fill="#E53935"/>
  <!-- feet -->
  <ellipse cx="12" cy="28" rx="2" ry="0.8" fill="#FF9800"/>
  <ellipse cx="20" cy="28" rx="2" ry="0.8" fill="#FF9800"/>
</svg>
