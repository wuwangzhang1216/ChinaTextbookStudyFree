name: ChinaTextbookStudy
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: zh-Hans
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: "课本学习"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.education"
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    INFOPLIST_KEY_NSHumanReadableCopyright: "本应用内所含教材内容版权归人民教育出版社等原出版方所有。客户端代码采用 MIT 许可开源。"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19
targets:
  ChinaTextbookStudy:
    type: application
    platform: iOS
    sources:
      - path: ChinaTextbookStudy
    resources:
      - path: ChinaTextbookStudy/Resources/seed-index.json
      - path: ChinaTextbookStudy/Resources/seed-data.zip
      - path: ChinaTextbookStudy/Resources/PrivacyInfo.xcprivacy
      - path: ChinaTextbookStudy/Resources/Assets.xcassets
    dependencies:
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ChinaTextbookStudy
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ChinaTextbookStudyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChinaTextbookStudyTests
    dependencies:
      - target: ChinaTextbookStudy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ChinaTextbookStudyTests
  ChinaTextbookStudyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ChinaTextbookStudyUITests
    dependencies:
      - target: ChinaTextbookStudy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ChinaTextbookStudyUITests
schemes:
  ChinaTextbookStudy:
    build:
      targets:
        ChinaTextbookStudy: all
        ChinaTextbookStudyTests: [test]
        ChinaTextbookStudyUITests: [test]
    test:
      targets:
        - ChinaTextbookStudyTests
        - ChinaTextbookStudyUITests
